name: Build APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Process
        run: |
          npm init -y
          npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/android@latest @capacitor/assets
          
          mkdir -p www
          [ -f "index.html" ] && mv index.html www/
          
          npx cap init "Momentum" "com.harshitnimje.momentum" --web-dir www
          npx cap add android
          
          # UPDATE THE PATH HERE
          # Ensure assets exist
          if [ -f "assets/icon-foreground.png" ] && [ -f "assets/icon-background.png" ]; then
            echo "✅ Adaptive icon assets detected"
          
            rm -rf android/app/src/main/res
          
            npx capacitor-assets generate --android
            npx cap sync android
          
          else
            echo "❌ ERROR: Required adaptive icon files missing!"
            exit 1
          fi
          
          npx cap sync android
          cd android && ./gradlew clean assembleDebug --no-daemon

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Momentum-Build-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk
