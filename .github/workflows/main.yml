name: Build APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Process
        run: |
          npm init -y
          npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/android@latest @capacitor/assets
          
          # 1. Find the icon before doing anything else
          ICON_PATH=$(find . -maxdepth 2 -name "icon.png" -print -quit)
          
          if [ -z "$ICON_PATH" ]; then
            echo "❌ ERROR: icon.png not found! Upload it to your repo main folder."
            exit 1
          fi

          # 2. Setup folders
          mkdir -p www
          [ -f "index.html" ] && mv index.html www/
          
          # 3. Initialize and Add Android
          npx cap init "Momentum" "com.harshitnimje.momentum" --web-dir www
          npx cap add android
          
          # 4. Generate Icons
          echo "✅ Found icon at $ICON_PATH. Generating Android assets..."
          npx capacitor-assets generate --android --icon "$ICON_PATH"
          
          # 5. Final Sync and Build
          npx cap sync android
          cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Momentum-Build-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest-build"
          name: "Latest Momentum Build"
          body: "This is the latest automated build of your app."
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
