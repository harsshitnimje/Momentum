name: Build APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Process
        run: |
          npm init -y
          # 1. Install the tool that handles icons
          npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/android@latest @capacitor/assets
          
          mkdir -p www
          if [ -f "index.html" ]; then mv index.html www/; fi
          
          npx cap init "Momentum" "com.harshitnimje.momentum" --web-dir www
          npx cap add android
          
          # 2. Generate the icons (This creates the res/mipmap folders)
          if [ -f "icon.png" ]; then
            npx capacitor-assets generate --android
          fi
          
          # 3. CRITICAL: Sync and Copy again to lock in the new icons
          npx cap sync android
          npx cap copy android
          
          cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Momentum-Build-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest-build"
          name: "Latest Momentum Build"
          body: "This is the latest automated build of your app."
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
